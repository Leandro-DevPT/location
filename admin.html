<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Chat UltraSeguro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00ff00;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .login-panel {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            border-radius: 10px;
        }
        
        .login-panel h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .login-panel input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            border-radius: 5px;
        }
        
        .login-panel button {
            width: 100%;
            padding: 15px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
        }
        
        .dashboard {
            display: none;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            padding: 20px;
            border-radius: 10px;
        }
        
        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.7;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .rooms-list {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .room-item {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .room-item:hover {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }
        
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .room-stats {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
        }
        
        .activity-log {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
        }
        
        .log-entry {
            border-bottom: 1px solid #333;
            padding: 10px 0;
            font-size: 0.85em;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-time {
            opacity: 0.5;
            margin-right: 10px;
        }
        
        .log-action {
            color: #ffff00;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #00ff00;
            margin-bottom: 30px;
        }
        
        .logout-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border-radius: 5px;
        }
        
        .client-ip {
            font-size: 0.8em;
            opacity: 0.5;
        }
        
        .messages-preview {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <!-- Login Panel -->
    <div class="login-panel" id="loginPanel">
        <h1>🔐 Admin Panel</h1>
        <input type="text" id="username" placeholder="Usuário" value="Owner">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="login()">Acessar Painel</button>
        <div id="loginError" style="color: red; margin-top: 10px; text-align: center;"></div>
    </div>
    
    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="admin-container">
            <div class="header">
                <h1>🛡️ Painel de Controle - Owner</h1>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
            
            <div class="stats-grid" id="statsGrid"></div>
            
            <div class="rooms-list">
                <h2>📡 Salas Ativas</h2>
                <div id="roomsContainer"></div>
            </div>
            
            <div class="activity-log">
                <h2>📋 Registro de Atividades</h2>
                <div id="activityLog"></div>
            </div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let updateInterval = null;
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    sessionId = data.session_id;
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    startDashboard();
                } else {
                    document.getElementById('loginError').textContent = data.message;
                }
            } catch (error) {
                document.getElementById('loginError').textContent = 'Erro de conexão';
            }
        }
        
        function startDashboard() {
            updateDashboard();
            updateInterval = setInterval(updateDashboard, 2000);
        }
        
        async function updateDashboard() {
            try {
                const response = await fetch('/api/admin/dashboard');
                const data = await response.json();
                
                // Atualizar estatísticas
                const statsGrid = document.getElementById('statsGrid');
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <h3>Salas Ativas</h3>
                        <div class="value">${data.system_status.total_rooms}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Conexões Totais</h3>
                        <div class="value">${data.system_status.total_connections}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Mensagens Totais</h3>
                        <div class="value">${data.system_status.total_messages}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Criptografia Ativa</h3>
                        <div class="value">🔒 ${data.system_status.encryption_active}</div>
                    </div>
                `;
                
                // Atualizar lista de salas
                const roomsContainer = document.getElementById('roomsContainer');
                if (data.rooms && data.rooms.length > 0) {
                    roomsContainer.innerHTML = data.rooms.map(room => `
                        <div class="room-item" onclick="viewRoom('${room.room_id}')">
                            <div class="room-header">
                                <strong>🏠 ${room.room_id}</strong>
                                <span>🔒 ${room.encryption_active ? 'Criptografada' : 'Insegura'}</span>
                            </div>
                            <div class="room-stats">
                                <span>👥 ${room.total_clients} clientes</span>
                                <span>💬 ${room.total_messages} mensagens</span>
                            </div>
                            ${room.active_clients.map(client => `
                                <div style="margin-top: 5px; font-size: 0.8em;">
                                    • ${client.client_id} | 📍 ${client.ip} | ⏱️ ${client.duration}
                                </div>
                            `).join('')}
                        </div>
                    `).join('');
                } else {
                    roomsContainer.innerHTML = '<p style="opacity: 0.5;">Nenhuma sala ativa no momento</p>';
                }
                
                // Atualizar log de atividades
                const activityLog = document.getElementById('activityLog');
                activityLog.innerHTML = data.recent_activity.reverse().map(log => `
                    <div class="log-entry">
                        <span class="log-time">${new Date(log.timestamp).toLocaleTimeString('pt-BR')}</span>
                        <span class="log-action">[${log.action}]</span>
                        <span>Sala: ${log.room_id} | Cliente: ${log.client_id}</span>
                        ${log.details ? `<br><span style="font-size: 0.8em; opacity: 0.7;">${JSON.stringify(log.details)}</span>` : ''}
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Erro ao atualizar dashboard:', error);
            }
        }
        
        async function viewRoom(roomId) {
            try {
                const response = await fetch(`/api/admin/room/${roomId}/messages`);
                const data = await response.json();
                const messages = data.messages.map(msg => `[
${new Date(msg.timestamp).toLocaleTimeString('pt-BR')}]
${msg.sender_id}: ${msg.decrypted_content}` ).join('\n\n');
                
                alert(`Sala: ${data.room_id}\n` +
                      `Clientes: ${data.room_info.total_clients}\n` +
                      `Mensagens: ${data.room_info.total_messages}\n` +
                      `Criptografia: ${data.room_info.encryption_active ? 'Ativa' : 'Inativa'}\n` +
                      `Chave: ${data.room_info.key_fingerprint || 'N/A'}\n\n` +
                      `Histórico:\n\n${messages || 'Nenhuma mensagem nesta sala.'}`);
            } catch (error) {
                console.error('Erro ao visualizar sala:', error);
            }
        }
        
        function logout() {
            clearInterval(updateInterval);
            sessionId = null;
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.cookie = "admin_session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        }
    </script>
</body>
</html>
